<body class="font-inter antialiased text-slate-900 tracking-tight">
    <div class="site-shell">
        <header class="site-header">
            <div class="max-w-6xl mx-auto px-4 sm:px-6">
                <div class="flex items-center justify-between h-16 md:h-20">
                    <a class="brand-lockup" href="index.html" aria-label="GRUMO y EQUIM-GRUMO">

                    <div class="flex md:hidden" x-data="{ expanded: false }">
                        <button class="mobile-toggle" aria-controls="mobile-nav" :aria-expanded="expanded" @click.stop="expanded = !expanded">
                            <span class="sr-only">Abrir menú</span>
                            <svg class="w-5 h-5 fill-current" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                                <rect y="2" width="16" height="2" rx="1"></rect>
                                <rect y="7" width="16" height="2" rx="1"></rect>
                                <rect y="12" width="16" height="2" rx="1"></rect>
                            </svg>
                        </button>
                        <nav
                            id="mobile-nav"
                            class="mobile-nav-panel"
                            @click.away="expanded = false"
                            @keydown.escape.window="expanded = false"
                            x-show="expanded"
                            x-transition:enter="transition ease-out duration-200 transform"
                            x-transition:enter-start="opacity-0 -translate-y-2"
                            x-transition:enter-end="opacity-100 translate-y-0"
                            x-transition:leave="transition ease-out duration-150"
                            x-transition:leave-start="opacity-100"
                            x-transition:leave-end="opacity-0"
                            x-cloak
                            data-mobile-nav="secondary"
                        ></nav>
                    </div>
                </div>
            </div>

                    <p class="page-intro">

                    </p>
                </div>
            </section>

            <section class="section-shell">
                <div class="max-w-4xl mx-auto px-4 sm:px-6">
                    <div class="document-list" data-reorganization-docs></div>

                    <article class="surface-card mt-8">
                        <span class="eyebrow">Contacto para este tema</span>
                        <p data-reorganization-contact></p>
                    </article>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="max-w-6xl mx-auto px-4 sm:px-6">
                <div class="footer-grid" data-footer-variant="reorganization"></div>
